<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Hexagonal frame lines (decorative) -->
  <line x1="8" y1="22" x2="8" y2="42" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="56" y1="22" x2="56" y2="42" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="8" y1="22" x2="20" y2="10" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="56" y1="22" x2="44" y2="10" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Candlestick bars (finance motif) -->
  <rect x="14" y="36" width="5" height="12" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  <line x1="16.5" y1="33" x2="16.5" y2="36" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="16.5" y1="48" x2="16.5" y2="51" stroke="#60a5fa" stroke-width="1.2"/>

  <rect x="22" y="28" width="5" height="16" rx="1.5" fill="url(#accent)" opacity="0.7"/>
  <line x1="24.5" y1="24" x2="24.5" y2="28" stroke="#818cf8" stroke-width="1.2"/>
  <line x1="24.5" y1="44" x2="24.5" y2="47" stroke="#818cf8" stroke-width="1.2"/>

  <rect x="30" y="20" width="5" height="20" rx="1.5" fill="url(#accent)" opacity="0.9"/>
  <line x1="32.5" y1="16" x2="32.5" y2="20" stroke="#a78bfa" stroke-width="1.2"/>
  <line x1="32.5" y1="40" x2="32.5" y2="43" stroke="#a78bfa" stroke-width="1.2"/>

  <rect x="38" y="24" width="5" height="18" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  <line x1="40.5" y1="20" x2="40.5" y2="24" stroke="#818cf8" stroke-width="1.2"/>
  <line x1="40.5" y1="42" x2="40.5" y2="45" stroke="#818cf8" stroke-width="1.2"/>

  <rect x="46" y="30" width="5" height="14" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <line x1="48.5" y1="26" x2="48.5" y2="30" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="48.5" y1="44" x2="48.5" y2="47" stroke="#60a5fa" stroke-width="1.2"/>

  <!-- Trend line over top -->
  <polyline points="16.5,34 24.5,26 32.5,18 40.5,22 48.5,28"
    fill="none" stroke="url(#line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Glow dot at peak -->
  <circle cx="32.5" cy="18" r="2.5" fill="#60a5fa" filter="url(#glow)" opacity="0.9"/>
</svg>